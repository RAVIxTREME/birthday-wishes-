<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎉</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        /* Wish Card Styling */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 430px;
            width: 90%;
            z-index: 10;
            transform: scale(0.9);
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            to { transform: scale(1); }
        }
        
        h1 {
            color: #ff4a7d;
            font-size: 2.5rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px rgba(0,0,0,0.05);
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        
        p {
            color: #555;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        /* Interactive Button */
        .btn {
            background: linear-gradient(45deg, #ff4a7d, #ff7657);
            border: none;
            padding: 14px 32px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 74, 125, 0.4);
            transition: 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 74, 125, 0.6);
        }
        .btn:active {
            transform: translateY(-1px);
        }
        
        /* Surprise Text Section */
        .surprise {
            display: none;
            margin-top: 25px;
            font-size: 1.4rem;
            color: #2c3e50;
            font-weight: bold;
            animation: fadeIn 1s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Animated Floating Balloons */
        .balloon {
            position: absolute;
            width: 50px;
            height: 65px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            bottom: -100px;
            opacity: 0.7;
            animation: floatUp 8s linear infinite;
            z-index: 1;
        }
        .balloon::after {
            content: "▲";
            font-size: 8px;
            color: inherit;
            position: absolute;
            bottom: -6px;
            left: 20px;
        }
        @keyframes floatUp {
            0% { bottom: -100px; transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(60px) rotate(15deg); }
            100% { bottom: 110vh; transform: translateX(-40px) rotate(-15deg); }
        }
        
        /* Canvas for Confetti */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <!-- Confetti Canvas Background -->
    <canvas id="confettiCanvas"></canvas>

    <!-- Main Card -->
    <div class="card">
        <!-- Tum yahaan apna naam ya text change kar sakte ho -->
        <h1 id="wish-title">Happy Birthday! 🎂</h1>
        <p>Wishing you a day full of crazy surprises, massive happiness, and all the success in the world! ✨</p>
        
        <button class="btn" onclick="revealSurprise()">Click for Surprise 🎁</button>
        
        <div class="surprise" id="surpriseMsg">
            May my all code run without bugs! 🚀🥳 <br>Party kadhi bhetnar? 
              -  Ravi🍕
        </div>
    </div>

    <script>
        // --- 1. Background Balloons Logic ---
        const colors = ['#ff4a7d', '#ff7657', '#ffda79', '#1abc9c', '#3498db', '#9b59b6', '#ff6b6b'];
        const totalBalloons = 15;

        for (let i = 0; i < totalBalloons; i++) {
            let balloon = document.createElement('div');
            balloon.className = 'balloon';
            
            // Random properties for unique look
            let randomColor = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.backgroundColor = randomColor;
            balloon.style.color = randomColor; 
            balloon.style.left = Math.random() * 90 + 'vw';
            balloon.style.animationDelay = Math.random() * 6 + 's';
            balloon.style.transform = `scale(${Math.random() * 0.5 + 0.7})`;
            
            document.body.appendChild(balloon);
        }

        // --- 2. Canvas Confetti Effect Logic ---
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class ConfettiParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 8 + 5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 + 2;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 4 - 2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
                if (this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        function initConfetti() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push(new ConfettiParticle());
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateConfetti);
        }

        // --- 3. Interactive Button Click Logic ---
        function revealSurprise() {
            // Surprise message show karna
            const msg = document.getElementById('surpriseMsg');
            msg.style.display = 'block';
            
            // Confetti generation and animation trigger
            initConfetti();
            animateConfetti();
            
            // Button text change aur disable karna after click
            const btn = document.querySelector('.btn');
            btn.innerHTML = "Enjoy Your Day! ❤️";
            btn.style.background = "#bdc3c7";
            btn.style.cursor = "default";
            btn.disabled = true;
            btn.style.boxShadow = "none";
            btn.style.transform = "none";
        }
    </script>
</body>
</html>
